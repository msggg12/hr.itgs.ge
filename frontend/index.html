    <meta charset="UTF-8" />

    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="ITGS HR" />
    <link rel="stylesheet" href="https://cdn.web-fonts.ge/fonts/bpg-arial/css/bpg-arial.min.css" />
    <link rel="manifest" href="/static/dashboard/manifest.webmanifest" />
    <link rel="icon" href="/static/dashboard/icons/icon-192.svg" type="image/svg+xml" />
    <title>ITGS HR</title>
    <script>
      (function () {
        if (!('serviceWorker' in navigator)) return
        window.addEventListener('load', function () {
          navigator.serviceWorker.getRegistrations().then(function (registrations) {
            registrations.forEach(function (registration) {
              registration.unregister()
            })
          })
          if ('caches' in window) {
            caches.keys().then(function (keys) {
              keys.forEach(function (key) {
                caches.delete(key)
              })
            })
          }
        })
      })()
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </head>
  <body>
    <div id="root"></div>
  </body>
  </html>
