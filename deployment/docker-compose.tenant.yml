services:
  app:
    environment:
      TENANT_CONTAINER_MODE: "true"
      TENANT_LABEL: ${TENANT_LABEL}
      FORCE_TENANT_LEGAL_ENTITY_ID: ${FORCE_TENANT_LEGAL_ENTITY_ID}
      TENANT_DATABASE_URL: ${TENANT_DATABASE_URL}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      CORS_ORIGINS: ${CORS_ORIGINS}
      JWT_SECRET: ${JWT_SECRET}
      MATTERMOST_SITE_URL: ${MATTERMOST_SITE_URL}
      MATTERMOST_PUBLIC_URL: ${MATTERMOST_PUBLIC_URL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}
      SMTP_USE_TLS: ${SMTP_USE_TLS}
    ports:
      - "${TENANT_APP_PORT:-8000}:8000"

  mattermost:
    environment:
      MM_SERVICESETTINGS_SITEURL: ${MATTERMOST_SITE_URL}
    ports:
      - "${TENANT_CHAT_PORT:-8065}:8065"
